name: CI - Lint, Build, and Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.14"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Build package distributions
        run: python3 -m build

      - name: Verify build artifacts
        run: |
          test -f dist/ai_prompt_runner-*.tar.gz
          test -f dist/ai_prompt_runner-*.whl

      - name: Smoke install wheel and sdist artifacts
        run: |
          WHEEL_PATH="$(find dist -maxdepth 1 -name 'ai_prompt_runner-*.whl' | head -n 1)"
          SDIST_PATH="$(find dist -maxdepth 1 -name 'ai_prompt_runner-*.tar.gz' | head -n 1)"
          test -n "$WHEEL_PATH"
          test -n "$SDIST_PATH"

          python3 -m venv /tmp/ci-artifact-smoke
          /tmp/ci-artifact-smoke/bin/python -m pip install --upgrade pip
          /tmp/ci-artifact-smoke/bin/python -m pip install "$WHEEL_PATH"
          /tmp/ci-artifact-smoke/bin/ai-prompt-runner --version

          /tmp/ci-artifact-smoke/bin/python -m pip install --force-reinstall "$SDIST_PATH"
          /tmp/ci-artifact-smoke/bin/ai-prompt-runner --version

      - name: Run tests with coverage gate
        run: |
          python3 -m pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-fail-under=95

  docker-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build runtime Docker image
        run: docker build --target runtime -t ai-prompt-runner:runtime .

      - name: Smoke test CLI in Docker
        run: docker run --rm ai-prompt-runner:runtime --version
